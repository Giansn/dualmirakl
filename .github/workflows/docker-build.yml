name: Build & Push Docker Image

on:
  push:
    branches: [claude/memory]
    paths:
      - Dockerfile
      - docker-post-start.sh
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: giansn
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: giansn/dualmirakl:runpod-cu128
          cache-from: type=registry,ref=giansn/dualmirakl:buildcache
          cache-to:   type=registry,ref=giansn/dualmirakl:buildcache,mode=max
