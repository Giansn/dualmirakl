name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
      - docker/entrypoint.sh
      - docker/post-start.sh
      - requirements.txt
      - .dockerignore
      - scripts/start_all.sh
      - scripts/start_authority.sh
      - scripts/start_swarm.sh
      - scripts/start_gateway.sh
      - config/*.env
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dualmirakl:runpod-cu129
            ${{ secrets.DOCKERHUB_USERNAME }}/dualmirakl:latest
            ghcr.io/giansn/dualmirakl:runpod-cu129
            ghcr.io/giansn/dualmirakl:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # Mirror existing Docker Hub image to GHCR (no rebuild)
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Install crane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz | tar xz crane
          sudo mv crane /usr/local/bin/

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | crane auth login index.docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Copy image to GHCR
        run: |
          crane copy ${{ secrets.DOCKERHUB_USERNAME }}/dualmirakl:runpod-cu129 ghcr.io/giansn/dualmirakl:runpod-cu129
          crane copy ${{ secrets.DOCKERHUB_USERNAME }}/dualmirakl:latest ghcr.io/giansn/dualmirakl:latest
