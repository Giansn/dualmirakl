<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>dualmirakl — GPU & System Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg0:#13141a;--bg1:#181a21;--bg2:#1f2129;--bg3:#282a33;--bd:#32343e;--t0:#e8e6e2;--t1:#aaa8a2;--t2:#888680;--a:#38c8c8;--w:#c4ae80;--r:#c09090;--rad:4px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg0);color:var(--t0);font-family:'Outfit',sans-serif;overflow-x:hidden}

.header{padding:20px 32px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.header h1{font-size:15px;font-weight:400;color:var(--t1);letter-spacing:1px}
.header .logo{width:24px;height:24px;border-radius:4px;overflow:hidden}
.header .logo img{width:100%;height:100%}
.header .sep{color:var(--bd)}
.header .sub{font-size:12px;color:var(--t2);font-weight:300}
.header .status{width:8px;height:8px;border-radius:50%;background:var(--r);margin-left:auto;animation:pulse 1.5s infinite}
.header .status.live{background:var(--a)}
.header .freq{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);margin-left:8px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.container{max-width:1200px;margin:0 auto;padding:24px 32px}

.section-title{font-size:9px;font-weight:400;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--bd)}

.gpu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:28px}

.card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--rad);padding:16px;transition:border-color .2s}
.card:hover{border-color:var(--t2)}

.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:12px;font-weight:400;color:var(--t1);display:flex;align-items:center;gap:8px}
.card-title .idx{color:var(--a);font-family:'JetBrains Mono',monospace;font-weight:500}
.role-badge{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;border:1px solid var(--bd);border-radius:2px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.card-temp{font-family:'JetBrains Mono',monospace;font-size:11px}

.metric{margin-bottom:12px}
.metric-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);margin-bottom:4px}
.metric-val{color:var(--t0)}
.bar-bg{background:var(--bg0);height:6px;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}

.chart-wrap{margin-top:14px;border-top:1px solid var(--bd);padding-top:12px}
.chart-wrap canvas{width:100%;height:48px;display:block}
.chart-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

.sys-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}

.services{margin-bottom:28px}
.svc-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-family:'JetBrains Mono',monospace;font-size:11px}
.svc-dot{width:6px;height:6px;border-radius:50%;background:var(--r);flex-shrink:0}
.svc-dot.on{background:var(--a)}
.svc-name{color:var(--t1);min-width:140px}
.svc-desc{color:var(--t2);font-size:10px}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><img src="/static/logo.svg" alt="mirakl"></div>
  <h1>dualmirakl</h1>
  <span class="sep">|</span>
  <span class="sub">GPU & System Monitor</span>
  <div class="status" id="statusDot"></div>
  <span class="freq" id="freqLabel">60 fps</span>
</div>

<div class="container">

  <!-- GPU CARDS -->
  <div class="section-title">gpu telemetry</div>
  <div class="gpu-grid" id="gpuCards">
    <div class="card" style="opacity:.5"><div style="font-size:11px;color:var(--t2)">waiting for telemetry...</div></div>
  </div>

  <!-- SYSTEM -->
  <div class="section-title">system</div>
  <div class="sys-grid">
    <div class="card" id="cpuCard">
      <div class="card-header"><span class="card-title"><span class="idx">CPU</span></span></div>
      <div class="metric">
        <div class="metric-row"><span>usage</span><span class="metric-val" id="monCpuPct">—</span></div>
        <div class="bar-bg"><div class="bar-fill" id="monCpuBar" style="width:0%;background:var(--a)"></div></div>
      </div>
      <div class="metric">
        <div class="metric-row"><span>ram</span><span class="metric-val" id="monRamLabel">—</span></div>
        <div class="bar-bg"><div class="bar-fill" id="monRamBar" style="width:0%;background:var(--a)"></div></div>
      </div>
    </div>
    <div class="card" id="servicesCard">
      <div class="card-header"><span class="card-title">Services</span></div>
      <div id="monServices">
        <div class="svc-row"><div class="svc-dot" id="monSvcAuth"></div><span class="svc-name">Authority :8000</span><span class="svc-desc">environment + observers</span></div>
        <div class="svc-row"><div class="svc-dot" id="monSvcSwarm"></div><span class="svc-name">Swarm :8001</span><span class="svc-desc">participants</span></div>
        <div class="svc-row"><div class="svc-dot" id="monSvcEmbed"></div><span class="svc-name">e5-small-v2 :9000</span><span class="svc-desc">embedding + search</span></div>
        <div class="svc-row"><div class="svc-dot" id="monSvcFlame"></div><span class="svc-name">FLAME :GPU2</span><span class="svc-desc" id="monFlameDesc">population dynamics</span></div>
      </div>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="section-title">utilization history (60s)</div>
  <div id="timelineCards" class="gpu-grid"></div>

</div>

<script>
const API = window.location.origin;
const ROLES = ['authority','swarm','flame'];
const POLL_MS = 1000; // 1 Hz data fetch
const HISTORY_LEN = 60; // 60s at 1Hz

// Per-GPU state: current (last poll), target (newest poll), interpolated
const gpuState = {};
const cpuState = { current: null, target: null };
const history = {};

function barColor(pct) { return pct > 90 ? 'var(--r)' : pct > 70 ? 'var(--w)' : 'var(--a)'; }
function lerp(a, b, t) { return a + (b - a) * t; }

let gpuCardsBuilt = false;
let timelineBuilt = false;
let lastPollTime = 0;

function buildGpuCards(gpus) {
  const container = document.getElementById('gpuCards');
  container.innerHTML = gpus.map((g, i) => {
    const role = ROLES[i] || '';
    const badge = role ? `<span class="role-badge">${role}</span>` : '';
    gpuState[i] = {
      current: { util: 0, memUsed: 0, memTotal: g.memory_total || 1, power: 0, temp: 0 },
      target:  { util: 0, memUsed: 0, memTotal: g.memory_total || 1, power: 0, temp: 0 },
    };
    return `<div class="card" id="gpuCard${i}">
      <div class="card-header">
        <span class="card-title"><span class="idx">GPU ${i}</span> ${(g.name||'').replace('NVIDIA ','').trim()} ${badge}</span>
        <span class="card-temp" id="gpuTemp${i}">—</span>
      </div>
      <div class="metric">
        <div class="metric-row"><span>utilization</span><span class="metric-val" id="gpuUtil${i}">0%</span></div>
        <div class="bar-bg"><div class="bar-fill" id="gpuUtilBar${i}" style="width:0%"></div></div>
      </div>
      <div class="metric">
        <div class="metric-row"><span>vram</span><span class="metric-val" id="gpuVram${i}">—</span></div>
        <div class="bar-bg"><div class="bar-fill" id="gpuVramBar${i}" style="width:0%"></div></div>
      </div>
      <div class="metric">
        <div class="metric-row"><span>power</span><span class="metric-val" id="gpuPower${i}">—</span></div>
        <div class="bar-bg"><div class="bar-fill" id="gpuPowerBar${i}" style="width:0%"></div></div>
      </div>
    </div>`;
  }).join('');
  gpuCardsBuilt = true;
}

function buildTimeline(gpus) {
  const container = document.getElementById('timelineCards');
  container.innerHTML = gpus.map((g, i) => {
    history[i] = { util: [] };
    const role = ROLES[i] || '';
    return `<div class="card">
      <div class="chart-label">GPU ${i} ${role ? '(' + role + ')' : ''} — utilization</div>
      <div class="chart-wrap"><canvas id="chart${i}" width="340" height="48"></canvas></div>
    </div>`;
  }).join('');
  timelineBuilt = true;
}

// Store new poll targets (called at 1 Hz)
function setTargets(data) {
  if (!data.gpus) return;
  data.gpus.forEach((g, i) => {
    if (!gpuState[i]) return;
    const s = gpuState[i];
    // Snap current to wherever interpolation got to
    s.current.util = s._interp ? s._interp.util : s.current.util;
    s.current.memUsed = s._interp ? s._interp.memUsed : s.current.memUsed;
    s.current.power = s._interp ? s._interp.power : s.current.power;
    s.current.temp = s._interp ? s._interp.temp : s.current.temp;
    // Set new targets
    s.target.util = g.utilization || 0;
    s.target.memUsed = g.memory_used || 0;
    s.target.memTotal = g.memory_total || 1;
    s.target.power = g.power_draw || 0;
    s.target.temp = g.temp || 0;
    s._interp = { ...s.current };
    // Push to history (1 sample per second)
    if (history[i]) {
      history[i].util.push(s.target.util);
      if (history[i].util.length > HISTORY_LEN) history[i].util.shift();
    }
  });
  if (data.cpu) {
    cpuState.current = cpuState._interp || cpuState.current || { percent: 0, memUsed: 0, memTotal: 1 };
    cpuState.target = { percent: data.cpu.percent, memUsed: data.cpu.memory_used, memTotal: data.cpu.memory_total };
    cpuState._interp = { ...cpuState.current };
  }
  lastPollTime = performance.now();
}

// 60 fps render loop
function renderFrame() {
  const t = Math.min(1, (performance.now() - lastPollTime) / POLL_MS);
  const ease = t * t * (3 - 2 * t); // smoothstep

  // Interpolate GPU metrics
  for (const i in gpuState) {
    const s = gpuState[i];
    if (!s._interp) continue;
    const util = lerp(s.current.util, s.target.util, ease);
    const memUsed = lerp(s.current.memUsed, s.target.memUsed, ease);
    const power = lerp(s.current.power, s.target.power, ease);
    const temp = lerp(s.current.temp, s.target.temp, ease);
    s._interp = { util, memUsed, power, temp };

    const memPct = s.target.memTotal ? (memUsed / s.target.memTotal * 100) : 0;
    const pwrPct = Math.min(100, power / 350 * 100);
    const tempColor = temp > 80 ? 'var(--r)' : temp > 65 ? 'var(--w)' : 'var(--t2)';

    const utilEl = document.getElementById(`gpuUtil${i}`);
    if (utilEl) utilEl.textContent = Math.round(util) + '%';
    const utilBar = document.getElementById(`gpuUtilBar${i}`);
    if (utilBar) { utilBar.style.width = util.toFixed(1) + '%'; utilBar.style.background = barColor(util); }

    const vramEl = document.getElementById(`gpuVram${i}`);
    if (vramEl) vramEl.textContent = `${Math.round(memUsed).toLocaleString()} / ${(s.target.memTotal||0).toLocaleString()} MB (${Math.round(memPct)}%)`;
    const vramBar = document.getElementById(`gpuVramBar${i}`);
    if (vramBar) { vramBar.style.width = memPct.toFixed(1) + '%'; vramBar.style.background = barColor(memPct); }

    const pwrEl = document.getElementById(`gpuPower${i}`);
    if (pwrEl) pwrEl.textContent = power.toFixed(1) + 'W';
    const pwrBar = document.getElementById(`gpuPowerBar${i}`);
    if (pwrBar) { pwrBar.style.width = pwrPct.toFixed(1) + '%'; pwrBar.style.background = barColor(pwrPct); }

    const tempEl = document.getElementById(`gpuTemp${i}`);
    if (tempEl) { tempEl.textContent = Math.round(temp) + '°C'; tempEl.style.color = tempColor; }
  }

  // Interpolate CPU
  if (cpuState.target && cpuState.current && cpuState._interp) {
    const cpuPct = lerp(cpuState.current.percent, cpuState.target.percent, ease);
    const ramUsed = lerp(cpuState.current.memUsed, cpuState.target.memUsed, ease);
    const ramTotal = cpuState.target.memTotal;
    const ramPct = ramTotal ? (ramUsed / ramTotal * 100) : 0;

    const pctEl = document.getElementById('monCpuPct');
    const pctBar = document.getElementById('monCpuBar');
    const ramLabel = document.getElementById('monRamLabel');
    const ramBar = document.getElementById('monRamBar');
    if (pctEl) pctEl.textContent = cpuPct.toFixed(1) + '%';
    if (pctBar) { pctBar.style.width = cpuPct.toFixed(1) + '%'; pctBar.style.background = barColor(cpuPct); }
    if (ramLabel) ramLabel.textContent = `${Math.round(ramUsed).toLocaleString()} / ${ramTotal.toLocaleString()} MB (${Math.round(ramPct)}%)`;
    if (ramBar) { ramBar.style.width = ramPct.toFixed(1) + '%'; ramBar.style.background = barColor(ramPct); }
  }

  // Redraw timeline charts
  for (const i in history) drawChart(parseInt(i));

  requestAnimationFrame(renderFrame);
}

function drawChart(gpuIdx) {
  const canvas = document.getElementById(`chart${gpuIdx}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const data = history[gpuIdx].util;

  ctx.clearRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = 'rgba(50,52,62,.5)';
  ctx.lineWidth = 0.5;
  [0.25, 0.5, 0.75].forEach(frac => {
    ctx.beginPath();
    ctx.moveTo(0, h * frac);
    ctx.lineTo(w, h * frac);
    ctx.stroke();
  });

  if (data.length < 2) return;

  // Interpolated head: append current interp value for smooth leading edge
  const interp = gpuState[gpuIdx] && gpuState[gpuIdx]._interp;
  const plotData = interp ? [...data.slice(0, -1), interp.util] : data;

  // Fill
  ctx.beginPath();
  ctx.moveTo(0, h);
  plotData.forEach((v, i) => {
    const x = (i / (HISTORY_LEN - 1)) * w;
    const y = h - (v / 100) * h;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(((plotData.length - 1) / (HISTORY_LEN - 1)) * w, h);
  ctx.closePath();
  ctx.fillStyle = 'rgba(56,200,200,.08)';
  ctx.fill();

  // Line
  ctx.beginPath();
  plotData.forEach((v, i) => {
    const x = (i / (HISTORY_LEN - 1)) * w;
    const y = h - (v / 100) * h;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = 'var(--a)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

async function pollServices() {
  try {
    const [hr, fr] = await Promise.all([
      fetch(`${API}/health`).then(r => r.json()).catch(() => ({})),
      fetch(`${API}/simulation/flame`).then(r => r.json()).catch(() => ({})),
    ]);
    const map = { authority: 'monSvcAuth', swarm: 'monSvcSwarm', 'e5-small-v2': 'monSvcEmbed' };
    for (const [key, id] of Object.entries(map)) {
      const dot = document.getElementById(id);
      if (dot) dot.className = 'svc-dot ' + (hr[key] === 'up' ? 'on' : '');
    }
    const flameDot = document.getElementById('monSvcFlame');
    if (flameDot) flameDot.className = 'svc-dot ' + (fr.flame_enabled ? 'on' : '');
    const flameDesc = document.getElementById('monFlameDesc');
    if (flameDesc) flameDesc.textContent = fr.flame_enabled
      ? `${(fr.flame_n_population||0).toLocaleString()} agents`
      : 'disabled';
  } catch {}
}

async function poll() {
  try {
    const r = await fetch(`${API}/gpu/telemetry`);
    if (!r.ok) throw new Error();
    const d = await r.json();

    document.getElementById('statusDot').className = 'status live';

    if (d.gpus && d.gpus.length) {
      if (!gpuCardsBuilt) buildGpuCards(d.gpus);
      if (!timelineBuilt) buildTimeline(d.gpus);
      setTargets(d);
    }
  } catch {
    document.getElementById('statusDot').className = 'status';
  }
}

// Start: 1 Hz data poll + 60 fps render
setInterval(poll, POLL_MS);
setInterval(pollServices, 5000);
setTimeout(poll, 100);
setTimeout(pollServices, 500);
requestAnimationFrame(renderFrame);
</script>
</body>
</html>
